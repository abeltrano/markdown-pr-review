# TEMPORARY — delete this workflow after one successful run.
# Purpose: trigger the GitHub-federated service principal to make its first
# Azure DevOps API call so the marketplace Members page can find it.
#
# Run via: Actions tab → "Bootstrap publisher identity" → Run workflow.
# Then paste the printed "AzDO profile id" into:
#   https://marketplace.visualstudio.com/manage/publishers/abeltrano → Members → Add
name: Bootstrap publisher identity

on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (federated)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Create AzDO profile for the service principal
        run: |
          set -euo pipefail
          response=$(az rest \
            --method GET \
            --url https://app.vssps.visualstudio.com/_apis/profile/profiles/me \
            --resource 499b84ac-1321-427f-aa17-267ca6975798)
          profile_id=$(printf '%s' "$response" | jq -r '.id')
          printf '\n================================================================\n'
          printf 'Paste this AzDO profile id into the Marketplace Members page:\n\n'
          printf '  %s\n\n' "$profile_id"
          printf '================================================================\n'
