# Lint + type-check + test on every push to main and every PR.
# Runs on Node 20 to match package.json engines.node and the local dev env.
# The build job runs on a matrix of ubuntu-latest, macos-latest, and
# windows-latest so platform-specific regressions (path separators, EOL
# handling, file-watcher behaviour, SecretStorage backends) are caught
# in CI rather than after a marketplace install. The summary job at the
# bottom carries the stable `lint + build + test` name that branch
# protection requires, so adding or removing matrix entries does not
# require a branch-protection edit.
#
# The `coverage` job runs separately on ubuntu-latest only (coverage
# results are OS-independent) and uploads an lcov report to Codecov.
# It enforces the `c8` thresholds declared in package.json — a regression
# in tested-surface coverage fails the job. `coverage` is a required
# status check on main's branch-protection rule alongside
# `lint + build + test`, so renaming the job (or its `name:` value)
# would break PR auto-merge until protection is updated.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel previous in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Build (tsc --noEmit + esbuild --production)
        run: npm run build

      - name: Test (mocha)
        run: npm test

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    # id-token: write is required for Codecov's tokenless OIDC upload
    # flow (codecov/codecov-action@v7 with use_oidc: true). contents:read
    # is the default minimum needed for actions/checkout.
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Test with coverage (c8 mocha)
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        # v6 (2026-03-26) bumped the internal actions/github-script
        # pin from v7 (Node 20) to v8 (Node 24), clearing the Node 20
        # deprecation warning that v5 triggered. GitHub will force
        # Node 24 on June 16, 2026 and remove Node 20 on September 16,
        # 2026 — see
        # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/.
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/lcov.info
          disable_search: true
          use_oidc: true
          fail_ci_if_error: false

  # Single status-check name that aggregates the matrix. Keep this exact
  # string ("lint + build + test") — it is the required status check on
  # main's branch-protection rule, so renaming or removing it would block
  # all PR auto-merges until protection is updated.
  ci:
    name: lint + build + test
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Fail if any matrix entry failed
        if: needs.build.result != 'success'
        run: |
          echo "One or more matrix entries failed (result: ${{ needs.build.result }})"
          exit 1
      - name: Report success
        run: echo "All matrix entries passed."
