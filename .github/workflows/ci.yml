# Lint + type-check + test on every push to main and every PR.
# Runs on Node 20 to match package.json engines.node and the local dev env.
# The build job runs on a matrix of ubuntu-latest, macos-latest, and
# windows-latest so platform-specific regressions (path separators, EOL
# handling, file-watcher behaviour, SecretStorage backends) are caught
# in CI rather than after a marketplace install. The summary job at the
# bottom carries the stable `lint + build + test` name that branch
# protection requires, so adding or removing matrix entries does not
# require a branch-protection edit.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel previous in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Build (tsc --noEmit + esbuild --production)
        run: npm run build

      - name: Test (mocha)
        run: npm test

  # Single status-check name that aggregates the matrix. Keep this exact
  # string ("lint + build + test") — it is the required status check on
  # main's branch-protection rule, so renaming or removing it would block
  # all PR auto-merges until protection is updated.
  ci:
    name: lint + build + test
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Fail if any matrix entry failed
        if: needs.build.result != 'success'
        run: |
          echo "One or more matrix entries failed (result: ${{ needs.build.result }})"
          exit 1
      - name: Report success
        run: echo "All matrix entries passed."
