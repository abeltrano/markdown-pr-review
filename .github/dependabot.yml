version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    versioning-strategy: increase
    commit-message:
      prefix: deps
      include: scope
    labels:
      - dependencies
    groups:
      types:
        patterns:
          - "@types/*"
      eslint:
        patterns:
          - eslint
          - "@eslint/*"
          - typescript-eslint
      typescript:
        patterns:
          - typescript
          - tsx
          - ts-node
          - tsconfig-paths
      mocha:
        patterns:
          - mocha
          - "@types/mocha"
          - chai
          - "@types/chai"
      vscode:
        patterns:
          - "@types/vscode"
          - "@vscode/*"
      # Catch-all so any remaining minor or patch bump not matched by a
      # named group above lands in a single PR. Majors stay individual
      # so breaking upgrades get isolated review.
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      # Fold all npm security-update PRs (Dependabot alerts) into one PR
      # so vulnerability fixes land together instead of one-per-advisory.
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
    # @types/vscode must not exceed engines.vscode (^1.85.0): a higher
    # range makes `vsce package` fail ("@types/vscode X greater than
    # engines.vscode Y"). Keep the range on the 1.85 line and bump it
    # deliberately alongside engines.vscode, not automatically.
    ignore:
      - dependency-name: "@types/vscode"
        update-types:
          - version-update:semver-minor
          - version-update:semver-major
      # typescript-eslint (pinned at 8.63.0) caps its typescript peer at
      # <6.1.0, and no typescript-eslint release supports TypeScript 7
      # yet, so a major bump breaks `npm ci` with ERESOLVE. Hold on the
      # 6.x line until typescript-eslint ships TS 7 support, then lift.
      - dependency-name: "typescript"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - github-actions
    groups:
      # Fold all GitHub Actions bumps into one PR; action major bumps
      # are low-risk and easy to revert, so grouping them is safe.
      actions:
        patterns:
          - "*"
