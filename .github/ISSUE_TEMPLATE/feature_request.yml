name: Feature request
description: Suggest a new feature or enhancement.
title: "[feat] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: |
        What problem are you trying to solve? What's the current
        friction in your workflow?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the extension to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Other approaches you've thought about, and why they fall short.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: |
        Mock-ups, links to Azure DevOps documentation, screenshots,
        related issues, etc.
