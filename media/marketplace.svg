<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!--
    Source for media/marketplace.png (the marketplace tile referenced from
    package.json "icon"). Regenerate the PNG with:

      magick -background none -density 1536 media/marketplace.svg \
          -resize 512x512 PNG32:media/marketplace.png

    Design notes:
    * The marketplace icon must be PNG (the VS Code marketplace rejects
      SVG for security reasons). We keep the SVG here purely as the
      regenerable source.
    * 512x512 covers 3x HiDPI / Retina-class displays where the
      marketplace can render the icon at substantial physical pixel
      density. PNG compression keeps a flat-color design like this
      well under 15 KB at 512x512.
    * The -background flag MUST precede the input file so it applies
      during SVG rasterization. We use `none` so the rounded corners
      stay transparent (only the inner rect fills); without it,
      ImageMagick paints the corners white.
    * Filled pure-black tile (#000000) with white strokes follows the
      2025 dev-tool marketplace convention (Bun, Prettier, Vercel,
      Linear-class extensions). White-on-black gives the highest
      contrast ratio (~21:1) so the glyph stays crisp at every render
      size, and the tile reads identically on light and dark VS Code
      themes (the marketplace `icon` field only accepts one image —
      no `{light,dark}` variants — so theme-neutral is required).
    * Rounded corners at rx/ry=18 on a 128 viewBox is ~14%, matching
      the iOS/macOS app-icon convention most modern marketplace tiles
      follow.
  -->

  <!-- Filled black background with rounded corners -->
  <rect width="128" height="128" rx="18" ry="18" fill="#000000"/>

  <!-- Speech bubble + M↓ glyph, harmonized with the activity-bar icon -->
  <g fill="none" stroke="#FFFFFF" stroke-width="5.5"
     stroke-linejoin="round" stroke-linecap="round">

    <!-- Speech bubble with tail at bottom-left -->
    <path d="M18 24 H110 a6 6 0 0 1 6 6 V78 a6 6 0 0 1 -6 6 H60 L36 104 V84 H18 a6 6 0 0 1 -6 -6 V30 a6 6 0 0 1 6 -6 z"/>

    <!-- "M" glyph -->
    <path d="M30 66 V42 l14 16 14 -16 V66"/>

    <!-- "↓" glyph: stem + arrowhead -->
    <path d="M82 42 V66"/>
    <path d="M72 56 82 66 92 56"/>
  </g>
</svg>
